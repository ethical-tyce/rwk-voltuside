        function normalizeBrowserTabList(rawData) {
            const list = Array.isArray(rawData) ? rawData : [];
            return list
                .filter(tab => tab && tab.id !== undefined && tab.id !== null)
                .map(tab => ({
                    id: tab.id,
                    title: tab.title || 'Untitled Tab',
                    url: tab.url || ''
                }));
        }

        function applyBrowserTabList(rawData) {
            browserTabCache = normalizeBrowserTabList(rawData);
            const availableIds = new Set(browserTabCache.map(tab => tab.id));
            selectedBrowserTabIds = selectedBrowserTabIds.filter(id => availableIds.has(id));

            if (!activeBrowserTabId || !availableIds.has(activeBrowserTabId)) {
                activeBrowserTabId = browserTabCache.length > 0 ? browserTabCache[0].id : null;
            }
        }

        function handleExtensionMessage(rawMessage) {
            let message;
            try {
                message = typeof rawMessage === 'string' ? JSON.parse(rawMessage) : rawMessage;
            } catch {
                return;
            }

            if (!message || typeof message !== 'object') {
                return;
            }

            if (message.type === 'TAB_LIST') {
                applyBrowserTabList(message.data);
                renderTabBrowserList();
            }
        }

        function ensureExtensionBridgeSubscription() {
            if (extensionBridgeSubscribed) return;

            if (!window.extensionBridge) {
                return;
            }

            if (typeof window.extensionBridge.onMessage === 'function') {
                window.extensionBridge.onMessage((message) => {
                    handleExtensionMessage(message);
                });
            }

            if (typeof window.extensionBridge.onStatus === 'function') {
                window.extensionBridge.onStatus((status) => {
                    extensionBridgeStatus = status;
                });
            }

            extensionBridgeSubscribed = true;
        }

        // This updates our floating capsule whenever the extension connects/disconnects
        window.extensionBridge.onStatus((status) => {
            const capsule = document.getElementById('statusCapsule');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (status.connectedClients > 0) {
                // TURN GREEN
                capsule.classList.add('online');
                dot.classList.add('online');
                text.classList.add('online');
                text.textContent = 'Online';
            } else {
                // TURN GREY
                capsule.classList.remove('online');
                dot.classList.remove('online');
                text.classList.remove('online');
                text.textContent = 'Offline';
            }
        });

        async function ensureExtensionSocket() {
            if (!window.extensionBridge || typeof window.extensionBridge.getStatus !== 'function') {
                throw new Error('Electron extension bridge is unavailable');
            }

            ensureExtensionBridgeSubscription();

            const status = await window.extensionBridge.getStatus();
            extensionBridgeStatus = status;

            if (!status || !status.serverRunning) {
                throw new Error((status && status.error) || 'Bridge server is not running');
            }

            return status;
        }

        function sendExtensionMessage(payload) {
            if (!window.extensionBridge || typeof window.extensionBridge.send !== 'function') {
                throw new Error('Electron extension bridge is unavailable');
            }

            ensureExtensionBridgeSubscription();
            window.extensionBridge.send(payload);
        }

        function getTargetBrowserTabIds() {
            if (selectedExecutionTarget === 'all') {
                return browserTabCache.map(tab => tab.id);
            }

            if (selectedExecutionTarget === 'selected') {
                return selectedBrowserTabIds.slice();
            }

            if (activeBrowserTabId) {
                return [activeBrowserTabId];
            }

            if (browserTabCache.length > 0) {
                return [browserTabCache[0].id];
            }

            return [];
        }

        function renderTabBrowserList(statusMessage = '') {
            const container = document.getElementById('tabListContainer');
            if (!container) return;

            container.innerHTML = '';

            if (statusMessage) {
                const status = document.createElement('div');
                status.className = 'tab-item';
                status.textContent = statusMessage;
                container.appendChild(status);
            }

            if (browserTabCache.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'tab-item';
                empty.textContent = 'No browser tabs received from extension';
                container.appendChild(empty);
                return;
            }

            browserTabCache.forEach(tab => {
                const item = document.createElement('div');
                item.className = 'tab-item';
                item.style.border = tab.id === activeBrowserTabId ? '1px solid #3a3a3a' : '1px solid transparent';

                const info = document.createElement('div');
                info.className = 'tab-item-info';

                const title = document.createElement('div');
                title.className = 'tab-item-name';
                title.textContent = tab.title;

                const meta = document.createElement('div');
                meta.className = 'tab-item-url';
                meta.textContent = tab.url;

                info.appendChild(title);
                info.appendChild(meta);

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'tab-checkbox';
                checkbox.checked = selectedBrowserTabIds.includes(tab.id);
                checkbox.disabled = selectedExecutionTarget !== 'selected';
                checkbox.addEventListener('click', (event) => {
                    event.stopPropagation();
                });
                checkbox.addEventListener('change', () => {
                    window.toggleTabSelection(tab.id);
                });

                item.appendChild(info);
                item.appendChild(checkbox);
                item.addEventListener('click', () => {
                    if (selectedExecutionTarget === 'selected') {
                        window.toggleTabSelection(tab.id);
                        return;
                    }

                    activeBrowserTabId = tab.id;
                    renderTabBrowserList();
                });
                container.appendChild(item);
            });
        }

        function runCodeLocally(code) {
            const htmlOutput = document.getElementById('htmlOutput');
            const htmlDoc = htmlOutput.contentDocument || htmlOutput.contentWindow.document;
            const serializedCode = JSON.stringify(code).replace(/<\//g, '<\\/');

            htmlDoc.open();
            htmlDoc.write(`
                            <!DOCTYPE html>
                            <html>
                            <body style="background:#000;color:#909090;font-family:monospace;padding:20px;">
                                <script>
                                    (function() {
                                        const userCode = ${serializedCode};
                                        const relay = (type, args) => {
                                            window.parent.postMessage({
                                                isLocalLog: true,
                                                type: type,
                                                args: Array.from(args).map(arg => {
                                                    try { return typeof arg === 'object' ? JSON.stringify(arg) : String(arg); }
                                                    catch(e) { return String(arg); }
                                                })
                                            }, '*');
                                        };

                                        console.log = (...args) => relay('log', args);
                                        console.warn = (...args) => relay('warn', args);
                                        console.error = (...args) => relay('error', args);

                                        try {
                                            (0, eval)(userCode);
                                        } catch (e) {
                                            const detail = e && e.stack ? e.stack : String(e);
                                            relay('error', [detail]);
                                        }
                                    })();
                                <\/script>
                            </body>
                            </html>
                        `);
            htmlDoc.close();
            document.getElementById('htmlOutputTab').click();
        }

        document.getElementById("execute").onclick = async () => {
            const code = getCurrentEditorCode();

            if (!code.trim()) {
                showToast('No code to execute');
                return;
            }

            if (executionMode === 'local') {
                runCodeLocally(code);
                return;
            }

            try {
                await ensureExtensionSocket();
            } catch (error) {
                showToast('Extension not connected');
                pushConsole("error", error.message);
                return;
            }

            const targetTabIds = getTargetBrowserTabIds();
            if (targetTabIds.length === 0) {
                showToast('No browser tabs selected');
                pushConsole("warn", "No browser tab targets available");
                try {
                    sendExtensionMessage({ type: 'GET_TABS' });
                } catch { }
                return;
            }

            try {
                sendExtensionMessage({
                    type: 'EXECUTE',
                    code: code,
                    target: selectedExecutionTarget,
                    tabIds: targetTabIds
                });
                showToast(`Sent to ${targetTabIds.length} browser tab(s)`);
                pushConsole("log", `Sent code to ${targetTabIds.length} browser tab(s)`);
            } catch (error) {
                showToast('Failed to send to extension');
                pushConsole("error", error.message);
            }
        };
    </script>
</body>
</html>
